# Documentation for all Judges
#
# Each documentation of a judge needs:
#   name: The name of the judge
#   description: A description of the overall idea of the judge
#   git_remotes: A list of git remotes to which a judge belongs to the judge.
#   measures: The list of measures provided by the Judge, each with a name and description

judges:
  IR-Axioms:
    description: |
      The IR-Axioms Judge provides axiomatic evaluation for Retrieval Augmented Generation mostly via pairwise comparisons of RAG responses. The RAG Axioms are described in the paper "Axioms for Retrieval-Augmented Generation" by Merker et al. [1] implementd in the ir-axioms package [2].

      References:
      [1] - https://webis.de/publications.html?q=axiom#merker_2025b
      [2] - https://github.com/webis-de/ir_axioms
      [3] - https://github.com/webis-de/ir_axioms/blob/main/docs/rag-axioms.md

    git_remotes: ["git@github.com:trec-auto-judge/auto-judge-starter-kit.git"]

