# Dataset configuration for run_all_datasets.py
#
# Two kinds of entries:
#   * fully specified (kiddie): responses/topics/truth given directly (committed under ./data).
#   * from_release: {track, task}: paths come from the fetched tarball's OWN datasets.yml
#     (./local-data/<track>/datasets.yml, produced by fetch_pilot_dataset.sh). The loader takes
#     that task's responses/topics/prio1_runs/assessed_topics and merges the tira_id/bucket below,
#     so data paths are not hand-maintained here — the release is the source of truth for them.
#
# Per-entry keys:
#   name:     dataset identifier (matches the tira_id prefix)
#   tira_id:  (optional) TIRA dataset id, for `tira-cli upload` (data submission)
#   bucket:   (optional) meta-evaluation service track bucket
#   truth:    (optional) truth leaderboard for local --meta-evaluate (kiddie only; real truth is held server-side)

datasets:
  # Synthetic smoke-test dataset (committed under ./data; no fetch needed)
  - name: kiddie
    responses: ./data/kiddie/runs/repgen/
    topics: ./data/kiddie/topics/kiddie-topics.jsonl
    truth: ./data/kiddie/eval/kiddie_fake.eval.ir_measures.txt
    tira_id: kiddie-20260605-training

  # Real datasets — fetch with ./fetch_pilot_dataset.sh; responses/topics/prio1/assessed come from the release.
  - name: dragun-repgen
    from_release: {track: dragun25, task: repgen}
    tira_id: dragun-repgen-20260608-test
    bucket: dragun

  - name: rag25-gen
    from_release: {track: rag25, task: generation}
    tira_id: rag25-gen-20260608-test
    bucket: rag-generation

  - name: rag25-auggen
    from_release: {track: rag25, task: auggen}
    tira_id: rag25-auggen-20260608-test
    bucket: rag-auggen

  - name: ragtime25
    from_release: {track: ragtime25, task: repgen}
    tira_id: ragtime25-20260608-test
    bucket: ragtime

  # rag24 — TIRA code-submission ONLY (tira_id: rag24-20260604-test). Not available for local
  # processing; submit code via `tira-cli code-submission ... --dataset rag24-20260604-test`.
