# Dataset configuration for run_all_datasets.py
#
# Each dataset entry specifies:
#   name:            identifier for the dataset (matches the tira_id prefix)
#   responses:       path to the responses (runs) directory
#   topics:          path to the topics/requests file (JSONL)
#   tira_id:         (optional) TIRA dataset id, for `tira-cli upload` (data submission)
#   bucket:          (optional) meta-evaluation service track bucket (rag-generation / rag-auggen / ragtime / dragun)
#   corpus:          (optional) document corpus — an ir_datasets id, or a local path
#   truth:           (optional) truth leaderboard for local `--meta-evaluate` (held for real sets; see note)
#   prio1_runs:      (optional) run IDs selected by --runs prio1
#   assessed_topics: (optional) topic IDs selected by --topics assessed
#
# Real datasets are fetched into ./local-data/<track>/ by fetch_pilot_dataset.sh (gitignored).
# Only `kiddie` ships committed under ./data (the synthetic smoke-test dataset).
# Official truth for the real sets is HELD server-side (used by the meta-evaluation service);
# the file names are noted per entry for reference but are not present in a participant clone.

datasets:
  # Synthetic smoke-test dataset (committed under ./data)
  - name: kiddie
    responses: ./data/kiddie/runs/repgen/
    topics: ./data/kiddie/topics/kiddie-topics.jsonl
    truth: ./data/kiddie/eval/kiddie_fake.eval.ir_measures.txt
    tira_id: kiddie-20260605-training

  # RAG25 — generation task
  - name: rag25-gen
    responses: ./local-data/rag25/runs/generation/
    topics: ./local-data/rag25/topics/trec_rag_2025_requests.jsonl
    tira_id: rag25-gen-20260608-test
    bucket: rag-generation
    # official truth (server-side): rag-export/eval/rag.generation.official.eval.jsonl
