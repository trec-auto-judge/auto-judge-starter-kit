name: Integration Tests

on:
  push:
    branches:
      - main
      - staging

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Set up Dependencies
        uses: actions/setup-python@v4
      - name: Install trec-auto-judge from the repo
        working-directory: ${{github.workspace}}
        run: |
          pip3 install .[test]
          pip3 install --no-deps ir_datasets
          pip3 uninstall -y tira
          pip3 install 'git+https://github.com/tira-io/tira.git@rag4reports#subdirectory=python-client'

      - name: Test judges/naive
        run: |
          tira-cli code-submission \
            --dry-run \
            --path . \
            --file judges/naive/Dockerfile \
            --task trec-auto-judge \
            --dataset kiddie-20260403-training \
            --command 'auto-judge run --workflow /auto-judge/judges/naive/workflow.yml --rag-responses $inputDataset/runs/*/ --rag-topics $inputDataset/topics/*.jsonl --out-dir $outputDir'

      - name: Test judges/pyterrier_retrieval
        run: |
          tira-cli code-submission \
            --dry-run \
            --path . \
            --file judges/pyterrier_retrieval/Dockerfile \
            --task trec-auto-judge \
            --dataset kiddie-20260403-training \
            --command 'auto-judge run --workflow /auto-judge/judges/pyterrier_retrieval/workflow.yml --rag-responses $inputDataset/runs/*/ --rag-topics $inputDataset/topics/*.jsonl --out-dir $outputDir'
